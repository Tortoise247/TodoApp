services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - todoapi
      - todowebapp
    networks:
      - todoappnetwork

  todoapi:
    build:
      context: ../../
      dockerfile: scripts/Docker/Dockerfile_todoapi
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=todoapp
      - POSTGRES_USER=todoappuser
      - POSTGRES_PASSWORD=secret
    depends_on:
      - postgres
    networks:
      - todoappnetwork

  todowebapp:
    build:
      context: ../../
      dockerfile: scripts/Docker/Dockerfile_todoapp
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=todoapp
      - POSTGRES_USER=todoappuser
      - POSTGRES_PASSWORD=secret
    depends_on:
      - postgres
    networks:
      - todoappnetwork

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=todoapp
      - POSTGRES_USER=todoappuser
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todoappnetwork

volumes:
  postgres_data:

networks:
  todoappnetwork: